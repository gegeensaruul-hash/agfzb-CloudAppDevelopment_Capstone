{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
    <link rel="stylesheet" type="text/css" href="{% static 'djangoapp/style.css' %}">
    <link rel="stylesheet" href="{% static 'bootstrap.min.css' %}">
</head>
<body>
    <nav>
        <a href="/">Home</a>
        <a href="/about">About Us</a>
        <a href="/contact" class="active">Contact Us</a>
    </nav>
    <h1>Contact Us</h1>
    <div class="contact-info">
        <div class="contact-item">
            <img src="{% static 'cars.jpeg' %}" alt="Cars" class="img-fluid">
            <img src="{% static 'contactus.png' %}" alt="Contact Us" class="img-fluid">
            <h2>Best Cars Dealership</h2>
            <p>123 Auto Drive, Chicago, IL 60601</p>
            <p>Phone: (312) 555-0100</p>
            <p>Email: info@bestcars.com</p>
            <p>Hours: Mon-Fri 9am-6pm, Sat 10am-4pm</p>
        </div>
    </div>
</body>
</html>
