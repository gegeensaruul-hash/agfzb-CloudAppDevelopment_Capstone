<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Post Review</title>
    {% load static %}
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <a class="navbar-brand" href="#">Best Cars</a>
        <div class="collapse navbar-collapse">
            <ul class="navbar-nav mr-auto">
                <li class="nav-item"><a class="nav-link" href="/djangoapp/">Home</a></li>
            </ul>
            <ul class="navbar-nav ml-auto">
                {% if user.is_authenticated %}
                <li class="nav-item">
                    <span class="nav-link text-white">Welcome, {{ user.username }}</span>
                </li>
                {% endif %}
            </ul>
        </div>
    </nav>

    <div class="container mt-4">
        <h1>Post a Review for Dealer {{ dealer_id }}</h1>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label>Your Review</label>
                <textarea class="form-control" name="review" rows="4" placeholder="Write your review here..."></textarea>
            </div>
            <div class="form-group">
                <label>Purchase Date</label>
                <input type="date" class="form-control" name="purchase_date">
            </div>
            <div class="form-group">
                <label>Car Make</label>
                <input type="text" class="form-control" name="car_make" placeholder="e.g. Toyota">
            </div>
            <div class="form-group">
                <label>Car Model</label>
                <input type="text" class="form-control" name="car_model" placeholder="e.g. Camry">
            </div>
            <div class="form-group">
                <label>Car Year</label>
                <input type="number" class="form-control" name="car_year" placeholder="e.g. 2022">
            </div>
            <button type="submit" class="btn btn-primary">Submit Review</button>
        </form>
    </div>
</body>
</html>
