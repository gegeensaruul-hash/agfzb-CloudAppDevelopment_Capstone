name: CI/CD Pipeline
on:
  push:
    branches: [ master ]
jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install django djangorestframework django-cors-headers
      - name: Run tests
        run: |
          cd server
          python manage.py test

  lint_python:
    name: Lint Python Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pylint
      - name: Lint Python Files
        run: |
          pylint server/djangoapp/views.py --disable=all --enable=E || true

  lint_javascript:
    name: Lint JavaScript Files
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
      - name: Set up Node
        uses: actions/setup-node@v3
        with:
          node-version: '18'
      - name: Install dependencies
        run: |
          npm install -g eslint
      - name: Lint JavaScript Files
        run: |
          eslint server/frontend/src --ext .js,.jsx || true
